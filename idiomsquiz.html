<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infinitives and Gerunds Quiz Bot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f2f2f2; }
    #chat { background: white; padding: 20px; max-width: 700px; margin: auto; border-radius: 10px; }
    .message { margin: 10px 0; }
    .user { color: green; }
    .bot { color: #0a1857; }
    .options { margin: 12px 0; }
    .option-box {
      background: #0a1857;
      color: #fff;
      border-radius: 7px;
      padding: 12px 14px;
      margin: 7px 0;
      font-size: 1.07em;
      font-weight: bold;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .option-box:hover {
      background: #1a2a7a;
    }
    textarea { width: 100%; height: 80px; margin-top: 10px; resize: none; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
    button { padding: 10px 15px; margin: 5px 3px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
    button:hover { opacity: 0.9; }
    #studentName { width: 80%; padding: 7px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
    #audioStatus { color: #1976d2; margin-top: 10px; min-height: 22px; font-weight: bold; }
    .instruction { color: #666; font-size: 0.95em; font-style: italic; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="chat">
    <h2>🎤 Infinitives and Gerunds Quiz Bot</h2>
    <div>
      <input type="text" id="studentName" placeholder="Enter your name to start" />
      <button onclick="startQuiz()" id="startBtn">Start Quiz</button>
    </div>
    <div id="conversation"></div>
    <div class="instruction" id="instructionText" style="display:none;">Read the sentence and the options below, then record yourself saying the complete sentence with the correct answer.</div>
    <div class="options" id="optionsContainer" style="display:none;"></div>
    <button onclick="startRecording()" id="recordBtn" style="display:none;">🎙️ Record Your Full Sentence Answer</button>
    <textarea id="textOutput" readonly placeholder="Your recorded answer will appear here..." style="display:none;"></textarea>
    <button onclick="sendMessage()" id="sendBtn" style="display:none;">Check Answer</button>
    <button onclick="downloadPDF()" id="downloadBtn" style="display:none;">⬇️ Download PDF</button>
    <button onclick="submitResults()" id="submitBtn" style="display:none;background:#17a317;color:#fff;">Submit Results</button>
    <div id="audioStatus"></div>
  </div>
  
  <!-- Netlify Hidden Form (for quiz results) -->
  <form name="infinitives-gerunds-quiz" id="hiddenQuizForm" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="display:none;">
    <input type="hidden" name="form-name" value="infinitives-gerunds-quiz">
    <input type="hidden" name="subject" value="Infinitives and Gerunds Quiz Submission from infinitives-gerunds-quiz (%{submissionId})" />
    <input type="hidden" name="studentName" id="formStudentName">
    <input type="hidden" name="score" id="formScore">
    <input type="hidden" name="results" id="formResults">
    <input type="text" name="bot-field" style="display:none;">
  </form>
  <script>
      // ------ 1. YOUR QUIZ DATA HERE (WITH COMPLETE SENTENCES) ------
   const scriptLines = [
  {
    phrase: "She enjoys _____ books in her free time.",
    options: [
      "She enjoys reading books in her free time.",
      "She enjoys to read books in her free time.",
      "She enjoys to reading books in her free time."
    ],
    correct: 0
  },
  {
    phrase: "He wants _____ to the gym every morning.",
    options: [
      "He wants going to the gym every morning.",
      "He wants to go to the gym every morning.",
      "He wants goes to the gym every morning."
    ],
    correct: 1
  },
  {
    phrase: "I finished _____ the homework an hour ago.",
    options: [
      "I finished to do the homework an hour ago.",
      "I finished doing the homework an hour ago.",
      "I finished do the homework an hour ago."
    ],
    correct: 1
  },
  {
    phrase: "They decided _____ a vacation next month.",
    options: [
      "They decided taking a vacation next month.",
      "They decided to take a vacation next month.",
      "They decided take a vacation next month."
    ],
    correct: 1
  },
  {
    phrase: "Swimming and _____ are great exercises.",
    options: [
      "Swimming and running are great exercises.",
      "Swimming and to run are great exercises.",
      "Swimming and run are great exercises."
    ],
    correct: 0
  },
  {
    phrase: "Would you like _____ some tea?",
    options: [
      "Would you like having some tea?",
      "Would you like to have some tea?",
      "Would you like have some tea?"
    ],
    correct: 1
  },
  {
    phrase: "She keeps _____ the same mistakes.",
    options: [
      "She keeps making the same mistakes.",
      "She keeps to make the same mistakes.",
      "She keeps made the same mistakes."
    ],
    correct: 0
  },
  {
    phrase: "I look forward _____ you soon.",
    options: [
      "I look forward seeing you soon.",
      "I look forward to seeing you soon.",
      "I look forward to see you soon."
    ],
    correct: 1
  },
  {
    phrase: "He avoided _____ the difficult question.",
    options: [
      "He avoided to answer the difficult question.",
      "He avoided answering the difficult question.",
      "He avoided answered the difficult question."
    ],
    correct: 1
  },
  {
    phrase: "She promised _____ on time for the meeting.",
    options: [
      "She promised arriving on time for the meeting.",
      "She promised to arrive on time for the meeting.",
      "She promised arrive on time for the meeting."
    ],
    correct: 1
  }
];

function shuffleOptionsAndCorrectIndex() {
      scriptLines.forEach(q => {
        let arr = q.options.map((opt, idx) => ({opt, idx}));
        let correctOpt = q.options[q.correct];
        for (let j = arr.length - 1; j > 0; j--) {
          const k = Math.floor(Math.random() * (j + 1));
          [arr[j], arr[k]] = [arr[k], arr[j]];
        }
        q.options = arr.map(x => x.opt);
        q.correct = arr.findIndex(x => x.opt === correctOpt);
      });
    }
    shuffleOptionsAndCorrectIndex();

    // ------ 3. QUIZ LOGIC ------
    let scriptStep = 0;
    let transcript = [];
    let studentName = "";
    let scores = [];
    let quizComplete = false;
    let pdfDownloaded = false;

    const conversationDiv = document.getElementById('conversation');
    const textOutput = document.getElementById('textOutput');
    const recordBtn = document.getElementById('recordBtn');
    const sendBtn = document.getElementById('sendBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const submitBtn = document.getElementById('submitBtn');
    const startBtn = document.getElementById('startBtn');
    const studentNameInput = document.getElementById('studentName');
    const audioStatus = document.getElementById('audioStatus');
    const instructionText = document.getElementById('instructionText');
    const optionsContainer = document.getElementById('optionsContainer');

    function startQuiz() {
      studentName = studentNameInput.value.trim();
      if (!studentName) {
        alert("Please enter your name!");
        return;
      }
      studentNameInput.style.display = 'none';
      startBtn.style.display = 'none';
      scriptStep = 0;
      transcript = [];
      scores = [];
      quizComplete = false;
      pdfDownloaded = false;
      conversationDiv.innerHTML = '';
      nextBotPrompt();
    }

    async function nextBotPrompt() {
      if (scriptStep < scriptLines.length) {
        const entry = scriptLines[scriptStep];
        let html = `<div class="message bot"><b>Question ${scriptStep + 1} of ${scriptLines.length}:</b> ${entry.phrase}</div>`;
        conversationDiv.innerHTML = html;

        // Display options as complete sentences
        let optionsHtml = '';
        entry.options.forEach((opt, idx) => {
          optionsHtml += `<div class="option-box">${opt}</div>`;
        });
        optionsContainer.innerHTML = optionsHtml;
        optionsContainer.style.display = 'block';

        textOutput.value = "";
        textOutput.style.display = "block";
        instructionText.style.display = "block";
        recordBtn.style.display = "inline-block";
        sendBtn.style.display = "inline-block";
        downloadBtn.style.display = "none";
        submitBtn.style.display = "none";
        audioStatus.textContent = "";
      } else {
        // Quiz is finished
        quizComplete = true;

        const total = scriptLines.length;
        const correct = scores.filter(Boolean).length;
        const percent = Math.round((correct/total)*100);
        let feedback = "";
        if (percent >= 80) {
          feedback = `Quiz complete! Your score is ${percent} out of 100. Well done, ${studentName}.`;
        } else {
          feedback = `Quiz complete! Your score is ${percent} out of 100. You can improve, ${studentName}. Try again!`;
        }
        addMessage('bot', feedback);

        // Hide all input/buttons except PDF/submit
        textOutput.style.display = "none";
        recordBtn.style.display = "none";
        sendBtn.style.display = "none";
        instructionText.style.display = "none";
        optionsContainer.style.display = "none";
        downloadBtn.style.display = "inline-block";
        submitBtn.style.display = "inline-block";

        audioStatus.textContent = "⬇️ Download your PDF transcript first, then click 'Submit Results' to send to your teacher.";
      }
    }

    function startRecording() {
      if (quizComplete) return; // Prevent recording after finish
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert('Speech recognition not supported in this browser.');
        return;
      }
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.start();
      recordBtn.textContent = "Recording... (Speak now)";
      recordBtn.disabled = true;
      recognition.onresult = function(event) {
        const userText = event.results[0][0].transcript;
        textOutput.value = userText;
        recordBtn.textContent = "🎙️ Record Your Full Sentence Answer";
        recordBtn.disabled = false;
      };
      recognition.onerror = function(event) {
        recordBtn.textContent = "🎙️ Record Your Full Sentence Answer";
        recordBtn.disabled = false;
        alert("Speech recognition error: " + event.error);
      };
      recognition.onend = function() {
        recordBtn.textContent = "🎙️ Record Your Full Sentence Answer";
        recordBtn.disabled = false;
      };
    }

    function partialMatch(studentAnswer, correctAnswer) {
      const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/gi, '').split(' ').filter(Boolean);
      const correctWords = norm(correctAnswer);
      const studentWords = norm(studentAnswer);
      let matchCount = 0;
      correctWords.forEach(word => {
        if (studentWords.includes(word)) matchCount++;
      });
      return matchCount >= Math.max(1, Math.ceil(correctWords.length * 0.65));
    }

    async function sendMessage() {
      if (quizComplete) return; // Prevent sending after finish
      const userText = textOutput.value.trim();
      if (!userText) {
        alert("Please record your response first.");
        return;
      }
      addMessage('user', userText);
      const entry = scriptLines[scriptStep];
      const correctAnswer = entry.options[entry.correct];
      const isCorrect = partialMatch(userText, correctAnswer);
      transcript.push({
        phrase: entry.phrase,
        options: entry.options,
        studentAnswer: userText,
        correctAnswer: correctAnswer,
        isCorrect
      });
      scores.push(isCorrect);
      scriptStep++;
      nextBotPrompt();
    }

    function addMessage(who, text) {
      const div = document.createElement('div');
      div.className = `message ${who}`;
      div.textContent = `${who === 'user' ? 'You' : 'Bot'}: ${text}`;
      conversationDiv.appendChild(div);
      conversationDiv.scrollTop = conversationDiv.scrollHeight;
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const now = new Date();
      doc.setFontSize(16);
      doc.text(`Infinitives and Gerunds Quiz`, 10, 15);
      doc.setFontSize(12);
      doc.text(`Name: ${studentName}`, 10, 23);
      doc.text(`Date: ${now.toLocaleString()}`, 10, 30);
      const total = scriptLines.length;
      const correct = scores.filter(Boolean).length;
      const percent = Math.round((correct/total)*100);
      doc.setFontSize(14);
      doc.setTextColor(0, 86, 27);
      doc.text(`Score: ${percent}/100`, 10, 40);
      doc.setTextColor(0, 0, 0);
      let y = 52;
      transcript.forEach((entry, i) => {
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        doc.text(`Q${i+1}: ${entry.phrase}`, 10, y);
        y += 6;
        doc.setFontSize(10);
        entry.options.forEach((opt, idx) => {
          if (idx === scriptLines[i].correct) {
            doc.setTextColor(0, 86, 27);
            doc.text(`✓ ${opt}`, 14, y);
          } else {
            doc.setTextColor(0, 0, 0);
            doc.text(`- ${opt}`, 14, y);
          }
          y += 5;
        });
        y += 2;
        if (entry.isCorrect) {
          doc.setTextColor(0, 128, 0);
          doc.text(`Your answer: ${entry.studentAnswer} ✓`, 14, y);
          y += 6;
        } else {
          doc.setTextColor(220, 0, 0);
          doc.text(`Your answer: ${entry.studentAnswer} ✗`, 14, y);
          y += 5;
          doc.setTextColor(0, 86, 27);
          doc.text(`Correct: ${entry.correctAnswer}`, 14, y);
          y += 6;
        }
        doc.setTextColor(0, 0, 0);
        y += 2;
        if (y > 270) {
          doc.addPage();
          y = 15;
        }
      });
      const fileName = `${studentName.replace(/\s+/g, '_')}_infinitives_gerunds_quiz.pdf`;
      doc.save(fileName);
      pdfDownloaded = true;
    }

    function submitResults() {
      if (!pdfDownloaded) {
        alert("Please download your PDF transcript first!");
        return;
      }
      sendToNetlifyForm();
      audioStatus.textContent = "✅ Results sent to teacher via Netlify Forms!";
      submitBtn.style.display = "none";
      // Optionally: window.location.href = "/thanks.html";  // Redirect after submit
    }

    function sendToNetlifyForm() {
      const correct = scores.filter(Boolean).length;
      const percent = Math.round((correct / scriptLines.length) * 100);
      const answers = transcript.map((entry, i) => {
        return `Q${i + 1}: ${entry.phrase}\nYour answer: ${entry.studentAnswer}\nCorrect answer: ${entry.correctAnswer}\nResult: ${entry.isCorrect ? 'Correct' : 'Incorrect'}\n`;
      }).join("\n");
      document.getElementById("formStudentName").value = studentName;
      document.getElementById("formScore").value = `${percent}/100`;
      document.getElementById("formResults").value = answers;
      document.getElementById("hiddenQuizForm").submit();
    }
  </script>
</body>
</html>
