<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Irregular Verbs Past Participle Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f2f2f2; }
    #chat { background: white; padding: 20px; max-width: 600px; margin: auto; border-radius: 10px; }
    .message { margin: 10px 0; }
    .user { color: green; }
    .bot { color: #0a1857; }
    .options { margin: 12px 0; }
    .option-box {
      background: #0a1857;
      color: #fff;
      border-radius: 7px;
      padding: 12px 14px;
      margin: 7px 0;
      font-size: 1.07em;
      font-weight: bold;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .option-box:hover {
      background: #0f2b8f;
    }
    .option-box.selected {
      background: #1976d2;
    }
    .option-box.correct {
      background: #4caf50;
    }
    .option-box.incorrect {
      background: #f44336;
    }
    button { padding: 10px 15px; margin: 5px 3px; cursor: pointer; }
    #studentName { width: 80%; padding: 7px; margin-bottom: 10px; }
    #audioStatus { color: #1976d2; margin-top: 10px; min-height: 22px; }
  </style>
</head>
<body>
  <div id="chat">
    <h2>📚 Irregular Verbs - Past Participle Quiz</h2>
    <div>
      <input type="text" id="studentName" placeholder="Enter your name to start" />
      <button onclick="startQuiz()" id="startBtn">Start Quiz</button>
    </div>
    <div id="conversation"></div>
    <button onclick="downloadPDF()" id="downloadBtn" style="display:none;">⬇️ Download PDF</button>
    <button onclick="submitResults()" id="submitBtn" style="display:none;background:#17a317;color:#fff;">Submit Results</button>
    <div id="audioStatus"></div>
  </div>
  
  <!-- Netlify Hidden Form (for quiz results) -->
  <form name="verbs-quiz" id="hiddenQuizForm" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="display:none;">
    <input type="hidden" name="form-name" value="verbs-quiz">
    <input type="hidden" name="subject" value="Irregular Verbs Quiz Submission from verbs-quiz (%{submissionId})" />
    <input type="hidden" name="studentName" id="formStudentName">
    <input type="hidden" name="score" id="formScore">
    <input type="hidden" name="results" id="formResults">
    <input type="text" name="bot-field" style="display:none;">
  </form>

  <script>
    // ------ 1. QUIZ DATA: IRREGULAR VERBS PAST PARTICIPLE ------
    const scriptLines = [
      {
        phrase: "be",
        options: [
          "been",
          "be",
          "beed"
        ],
        correct: 0
      },
      {
        phrase: "come",
        options: [
          "comed",
          "come",
          "came"
        ],
        correct: 1
      },
      {
        phrase: "do",
        options: [
          "did",
          "done",
          "doed"
        ],
        correct: 1
      },
      {
        phrase: "eat",
        options: [
          "eated",
          "ate",
          "eaten"
        ],
        correct: 2
      },
      {
        phrase: "go",
        options: [
          "gone",
          "went",
          "goed"
        ],
        correct: 0
      },
      {
        phrase: "have",
        options: [
          "haved",
          "had",
          "have"
        ],
        correct: 1
      },
      {
        phrase: "leave",
        options: [
          "leaved",
          "left",
          "leave"
        ],
        correct: 1
      },
      {
        phrase: "make",
        options: [
          "made",
          "maked",
          "make"
        ],
        correct: 0
      },
      {
        phrase: "meet",
        options: [
          "meeted",
          "met",
          "meet"
        ],
        correct: 1
      },
      {
        phrase: "ride",
        options: [
          "rode",
          "ridded",
          "ridden"
        ],
        correct: 2
      },
      {
        phrase: "see",
        options: [
          "saw",
          "seen",
          "sawed"
        ],
        correct: 1
      },
      {
        phrase: "speak",
        options: [
          "spoke",
          "speaked",
          "spoken"
        ],
        correct: 2
      },
      {
        phrase: "take",
        options: [
          "taked",
          "took",
          "taken"
        ],
        correct: 2
      },
      {
        phrase: "write",
        options: [
          "wrote",
          "writeen",
          "written"
        ],
        correct: 2
      }
    ];

    function shuffleOptionsAndCorrectIndex() {
      scriptLines.forEach(q => {
        let arr = q.options.map((opt, idx) => ({opt, idx}));
        let correctOpt = q.options[q.correct];
        for (let j = arr.length - 1; j > 0; j--) {
          const k = Math.floor(Math.random() * (j + 1));
          [arr[j], arr[k]] = [arr[k], arr[j]];
        }
        q.options = arr.map(x => x.opt);
        q.correct = arr.findIndex(x => x.opt === correctOpt);
      });
    }
    shuffleOptionsAndCorrectIndex();

    // ------ 3. QUIZ LOGIC ------
    let scriptStep = 0;
    let transcript = [];
    let studentName = "";
    let scores = [];
    let quizComplete = false;
    let pdfDownloaded = false;
    let selectedAnswer = null;

    const conversationDiv = document.getElementById('conversation');
    const downloadBtn = document.getElementById('downloadBtn');
    const submitBtn = document.getElementById('submitBtn');
    const startBtn = document.getElementById('startBtn');
    const studentNameInput = document.getElementById('studentName');
    const audioStatus = document.getElementById('audioStatus');

    function startQuiz() {
      studentName = studentNameInput.value.trim();
      if (!studentName) {
        alert("Please enter your name!");
        return;
      }
      studentNameInput.style.display = 'none';
      startBtn.style.display = 'none';
      scriptStep = 0;
      transcript = [];
      scores = [];
      quizComplete = false;
      pdfDownloaded = false;
      conversationDiv.innerHTML = '';
      nextBotPrompt();
    }

    async function nextBotPrompt() {
      if (scriptStep < scriptLines.length) {
        const entry = scriptLines[scriptStep];
        let html = `<div class="message bot"><b>Question ${scriptStep + 1} of ${scriptLines.length}</b></div>`;
        html += `<div class="message bot"><b>Bot:</b> What is the past participle of "<b>${entry.phrase}</b>"?</div>`;
        html += `<div class="options">`;
        entry.options.forEach((opt, idx) => {
          html += `<div class="option-box" onclick="selectAnswer(${idx})" data-index="${idx}">${opt}</div>`;
        });
        html += `</div>`;
        conversationDiv.innerHTML = html;
        selectedAnswer = null;
        audioStatus.textContent = "";
      } else {
        // Quiz is finished
        quizComplete = true;

        const total = scriptLines.length;
        const correct = scores.filter(Boolean).length;
        const percent = Math.round((correct/total)*100);
        let feedback = "";
        if (percent >= 80) {
          feedback = `Quiz complete! Your score is ${percent} out of 100. Well done, ${studentName}.`;
        } else {
          feedback = `Quiz complete! Your score is ${percent} out of 100. You can improve, ${studentName}. Try again!`;
        }
        addMessage('bot', feedback);

        // Hide all input/buttons except PDF/submit
        downloadBtn.style.display = "inline-block";
        submitBtn.style.display = "inline-block";

        audioStatus.textContent = "⬇️ Download your PDF transcript first, then click 'Submit Results' to send to your teacher.";
      }
    }

    function selectAnswer(idx) {
      if (quizComplete) return;
      
      selectedAnswer = idx;
      const entry = scriptLines[scriptStep];
      const isCorrect = idx === entry.correct;
      
      // Remove previous selection styling
      document.querySelectorAll('.option-box').forEach(box => {
        box.classList.remove('selected', 'correct', 'incorrect');
      });
      
      // Style the selected answer
      const optionBoxes = document.querySelectorAll('.option-box');
      if (isCorrect) {
        optionBoxes[idx].classList.add('correct');
      } else {
        optionBoxes[idx].classList.add('incorrect');
        optionBoxes[entry.correct].classList.add('correct');
      }
      
      const userText = entry.options[idx];
      const correctAnswer = entry.options[entry.correct];
      
      addMessage('user', userText);
      transcript.push({
        phrase: entry.phrase,
        options: entry.options,
        studentAnswer: userText,
        correctAnswer: correctAnswer,
        isCorrect
      });
      scores.push(isCorrect);
      scriptStep++;
      
      // Auto-advance after 1.5 seconds
      setTimeout(() => {
        nextBotPrompt();
      }, 1500);
    }

    function addMessage(who, text) {
      const div = document.createElement('div');
      div.className = `message ${who}`;
      div.textContent = `${who === 'user' ? 'You' : 'Bot'}: ${text}`;
      conversationDiv.appendChild(div);
      conversationDiv.scrollTop = conversationDiv.scrollHeight;
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const now = new Date();
      doc.setFontSize(16);
      doc.text(`Irregular Verbs - Past Participle Quiz`, 10, 15);
      doc.setFontSize(12);
      doc.text(`Name: ${studentName}`, 10, 23);
      doc.text(`Date: ${now.toLocaleString()}`, 10, 30);
      const total = scriptLines.length;
      const correct = scores.filter(Boolean).length;
      const percent = Math.round((correct/total)*100);
      doc.setFontSize(14);
      doc.setTextColor(0, 86, 27);
      doc.text(`Score: ${percent}/100`, 10, 40);
      doc.setTextColor(0, 0, 0);
      let y = 52;
      transcript.forEach((entry, i) => {
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text(`Q${i+1}: What is the past participle of "${entry.phrase}"?`, 10, y);
        y += 7;
        doc.setFontSize(11);
        entry.options.forEach((opt, idx) => {
          if (opt === entry.correctAnswer) {
            doc.setTextColor(0, 86, 27);
          } else {
            doc.setTextColor(0, 0, 0);
          }
          doc.text(`- ${opt}`, 14, y);
          y += 6;
        });
        if (entry.isCorrect) {
          doc.setTextColor(0, 128, 0);
          doc.text(`Your answer: ${entry.studentAnswer} ✓`, 14, y);
          y += 8;
        } else {
          doc.setTextColor(220, 0, 0);
          doc.text(`Your answer: ${entry.studentAnswer} ✗`, 14, y);
          y += 6;
          doc.setTextColor(0, 86, 27);
          doc.text(`Correct answer: ${entry.correctAnswer}`, 14, y);
          y += 8;
        }
        doc.setTextColor(0, 0, 0);
        y += 2;
        if (y > 270) {
          doc.addPage();
          y = 15;
        }
      });
      const fileName = `${studentName.replace(/\s+/g, '_')}_irregular_verbs_quiz.pdf`;
      doc.save(fileName);
      pdfDownloaded = true;
    }

    function submitResults() {
      if (!pdfDownloaded) {
        alert("Please download your PDF transcript first!");
        return;
      }
      sendToNetlifyForm();
      audioStatus.textContent = "✅ Results sent to teacher via Netlify Forms!";
      submitBtn.style.display = "none";
    }

    function sendToNetlifyForm() {
      const correct = scores.filter(Boolean).length;
      const percent = Math.round((correct / scriptLines.length) * 100);
      const answers = transcript.map((entry, i) => {
        return `Q${i + 1}: ${entry.phrase}\nYour answer: ${entry.studentAnswer}\nCorrect answer: ${entry.correctAnswer}\nResult: ${entry.isCorrect ? 'Correct' : 'Incorrect'}\n`;
      }).join("\n");
      document.getElementById("formStudentName").value = studentName;
      document.getElementById("formScore").value = `${percent}/100`;
      document.getElementById("formResults").value = answers;
      document.getElementById("hiddenQuizForm").submit();
    }
  </script>
</body>
</html>
